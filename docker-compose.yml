
# docker-compose.yml — Pipeline de Données Boursières
# Environnement : Windows 11 + Docker Desktop (backend WSL2)
#
# ARCHITECTURE :
#   - Python 3.12 tourne EN LOCAL sur Windows (pas dans Docker)
#   - Ce fichier gère uniquement l'infrastructure (MySQL, monitoring, UI)
#   - Python se connecte à MySQL via localhost:3306
#   - Prometheus scrape Python via host.docker.internal:8000
#
# PRÉREQUIS :
#   - Docker Desktop installé avec backend WSL2 activé
#   - Python 3.12 installé sur Windows
#   - pip install pandas requests sqlalchemy pymysql azure-storage-blob prometheus-client
#
# DÉMARRAGE :
#   docker-compose up -d
#
# ARRÊT :
#   docker-compose down
#
# ARRÊT + suppression des volumes (reset complet) :
#   docker-compose down -v





# VOLUMES PERSISTANTS
# Les données survivent aux redémarrages des containers.
# Stockés dans : C:\Users\<user>\AppData\Local\Docker\wsl\data\
#Sans WSL
#C:\Users\<user>\AppData\Local\Docker\volumes\
# pour lister tous les volumes
#docker volume ls

volumes:
  mysql_data:
    name: mysql_data
    # Contient toutes les bases de données MySQL (couche Gold)

  grafana_data:
    name: grafana_data
    # Contient dashboards, datasources, alertes Grafana

  prometheus_data:
    name: prometheus_data
    # Contient les séries temporelles collectées par Prometheus


# RÉSEAU INTERNE
# Tous les containers communiquent entre eux via leurs noms de service.
# Exemple : grafana atteint mysql via "mysql:3306" (pas localhost).
# host.docker.internal permet aux containers d'atteindre Windows (Python local).

networks:
  stock_net:
    name: pipeline_network
    driver: bridge



# SERVICES

services:

  
  # 1. MySQL 8: Base de données relationnelle (couche Gold)
  #
  # Rôle : reçoit les données enrichies (OHLCV + indicateurs) insérées
  #        par le script Python via SQLAlchemy / pandas df.to_sql()
  #
  # Connexion depuis Python local (Windows) :
  #   engine = create_engine("mysql+pymysql://stock_user:stock_pass@localhost:3306/stockdb")
  #
  # Connexion depuis les autres containers (Grafana, mysqld-exporter) :
  #   host = "mysql", port = 3306
  
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped   # Redémarre automatiquement sauf si arrêt manuel

    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me   # ← À changer en production
      MYSQL_DATABASE: stockdb                         # Base créée automatiquement
      MYSQL_USER: hduser                          # Utilisateur applicatif
      MYSQL_PASSWORD: root                      #  À changer en production
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci

    ports:
      - "3306:3306"   # Expose MySQL sur localhost:3306 (accessible depuis Python Windows)

    volumes:
      - mysql_data:/var/lib/mysql                     # Persistance des données
      - ./init-sql:/docker-entrypoint-initdb.d        # Scripts SQL exécutés au premier démarrage
                                                      # Créer le dossier init-sql/ avec vos CREATE TABLE

    networks:
      - stock_net

    # Healthcheck : vérifie que MySQL accepte les connexions avant
    # que les autres services (grafana, exporter) tentent de s'y connecter
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hduser", "-proot"]
      interval: 10s    # Vérifie toutes les 10 secondes
      timeout: 5s      # Echec si pas de réponse en 5s
      retries: 5       # 5 tentatives avant de marquer "unhealthy"
      start_period: 30s # Laisse 30s à MySQL pour démarrer avant le premier check

    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=256M


  
  # 2. DBeaver CE (Community Edition) — Interface d'administration MySQL
  #
  # Rôle : explorer les tables MySQL, exécuter des requêtes SQL manuellement,
  #        vérifier les données insérées par le pipeline Python
  #
  # Accès : http://localhost:8978
  #
  # Connexion à configurer dans DBeaver :
  #   Host     : mysql  (nom du service Docker, pas localhost !)
  #   Port     : 3306
  #   Database : stockdb
  #   User     : hduser
  #   Password : root
  
  dbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: dbeaver
    restart: unless-stopped

    ports:
      - "8978:8978"   # Interface web DBeaver

    volumes:
      - ./dbeaver-data:/opt/cloudbeaver/workspace   # Persistance des connexions sauvegardées

    networks:
      - stock_net

    depends_on:
      mysql:
        condition: service_healthy   # Attend que MySQL soit healthy avant de démarrer


  
  # 3. mysqld-exporter — Exportateur de métriques MySQL pour Prometheus
  #
  # Rôle : se connecte à MySQL et expose des métriques techniques sur le port
  #        9104 que Prometheus viendra scraper (connexions actives, queries/sec,
  #        durée des requêtes, taille des tables, etc.)
  #
  # Remplace node-exporter qui n'est pas compatible Windows nativement.
  #
  # Métriques disponibles :
  #   mysql_global_status_connections
  #   mysql_global_status_queries
  #   mysql_info_schema_table_rows (nombre de lignes par table)
  #   mysql_slave_status_* (réplication si configurée)
  
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld_exporter
    restart: unless-stopped

    environment:
      # connexion MySQL pour l'exporter
      
      MYSQLD_EXPORTER_PASSWORD: root

    ports:
      - "9104:9104"   # Port standard mysqld-exporter (scrape par Prometheus)

    networks:
      - stock_net

    depends_on:
      mysql:
        condition: service_healthy

    command:
      - "--mysqld.username=hduser"
      - "--mysqld.address=mysql:3306"
      - "--no-collect.slave_status"  # Déactive la collecte de métrique qui surveille la réplication MySQL, utilisée quand tu as plusieurs serveurs MySQL synchronisés entre eux.
      - "--collect.info_schema.tables"          # Métriques par table (nb lignes, taille)
      - "--collect.info_schema.innodb_metrics"  # Métriques InnoDB internes
      - "--collect.global_status"               # Status global MySQL
      - "--collect.global_variables"            # Variables de configuration


  
  # 4. Prometheus — Système de collecte et stockage de métriques
  #
  # Rôle : scrape (collecte) les métriques depuis :
  #   - Le script Python local (host.docker.internal:8000) via prometheus_client
  #   - mysqld-exporter (métriques MySQL)
  #   - Lui-même (métriques internes Prometheus)
  #
  # Accès UI : http://localhost:9090
  # Rétention des données : 30 jours (configurable via --storage.tsdb.retention.time)
  #
  # IMPORTANT Windows : host.docker.internal est automatiquement résolu
  # vers l'adresse IP de la machine Windows hôte par Docker Desktop.
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"   # Interface web Prometheus + API

    volumes:
      - prometheus_data:/prometheus                         # Persistance des métriques
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro  # Config (lecture seule)
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro          # Règles d'alertes

    networks:
      - stock_net

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"   # Garde 30 jours de métriques
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"               # Permet le rechargement à chaud de la config

    depends_on:
      - mysqld-exporter

    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Sur Windows avec Docker Desktop, cette ligne est souvent automatique,
      # mais on la force explicitement pour garantir la résolution DNS
      # vers la machine Windows hôte (où tourne Python).


  
  # 5. Grafana — Visualisation & Dashboards
  #
  # Rôle : se connecte à DEUX sources de données :
  #   1. Prometheus → métriques pipeline (records ingérés, erreurs API, durée run)
  #   2. MySQL      → données boursières Gold (cours, SMA, EMA, RSI, VWAP)
  #
  # Accès : http://localhost:3000
  # Login par défaut : admin / admin (changé au premier accès)
  #
  # Les datasources sont provisionnées automatiquement via le fichier
  # ./grafana/provisioning/datasources/datasources.yml
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"   # Interface web Grafana

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin_change_me   # ← À changer en production
      GF_USERS_ALLOW_SIGN_UP: "false"               # Désactive l'inscription publique
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      #GF_INSTALL_PLUGINS: grafana-mysql-datasource  # Plugin MySQL officiel (si pas inclus)
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/stock_overview.json

    volumes:
      - grafana_data:/var/lib/grafana                                      # Persistance
      - ./grafana/provisioning:/etc/grafana/provisioning                   # Auto-config datasources + dashboards

    networks:
      - stock_net

    depends_on:
      mysql:
        condition: service_healthy
      prometheus:
        condition: service_started

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s


  
  # 6. Alertmanager — Gestion et routage des alertes Prometheus
  #
  # Rôle : reçoit les alertes déclenchées par Prometheus (RSI > 70,
  #        taux d'erreur API élevé, pipeline bloqué) et les route vers
  #        email, Slack, webhook, etc.
  #
  # Accès UI : http://localhost:9093
  # Config des notifications : ./alertmanager/alertmanager.yml
  
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped

    ports:
      - "9093:9093"

    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

    networks:
      - stock_net

    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"

    depends_on:
      - prometheus

