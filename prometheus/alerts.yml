# prometheus/alerts.yml: Règles d'alertes Prometheus
#
# EMPLACEMENT : ./prometheus/alerts.yml
#
# Syntaxe : chaque règle a un nom, une expression PromQL, une durée
# (for : l'alerte ne se déclenche qu'après X minutes continues),
# des labels (severity) et des annotations (description affichée).
#
# Les alertes déclenchées sont routées vers Alertmanager (alertmanager.yml).


groups:

  
  # Groupe 1 : Santé du Pipeline Python
  
  - name: pipeline_health
    rules:

      # Alerte si le script Python n'est plus joignable par Prometheus
      # (plus de métriques depuis 5 minutes = pipeline arrêté ou planté)
      - alert: PipelineDown
        expr: up{job="python_pipeline"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pipeline Python inaccessible"
          description: "Prometheus ne peut plus scraper le script Python sur host.docker.internal:8000 depuis plus de 5 minutes."

      # Alerte si le taux d'erreurs API dépasse 10% sur 10 minutes
      - alert: HighAPIErrorRate
        expr: >
          rate(pipeline_api_errors_total[10m])
          /
          rate(pipeline_api_calls_total[10m]) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taux d'erreurs API élevé ({{ $value | humanizePercentage }})"
          description: "Plus de 10% des appels API échouent. Vérifier les clés API et les rate limits."

      # Alerte si aucun run n'a réussi depuis plus de 2 heures
      - alert: PipelineStalled
        expr: (time() - pipeline_last_success_timestamp) > 7200
        for: 0m   # Déclenche immédiatement (pas de délai for)
        labels:
          severity: warning
        annotations:
          summary: "Pipeline bloqué — dernier succès il y a {{ $value | humanizeDuration }}"
          description: "Le pipeline n'a pas tourné avec succès depuis plus de 2 heures."

      # Alerte si le score de qualité des données passe sous 95%
      - alert: LowDataQuality
        expr: data_quality_score < 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Qualité des données dégradée ({{ $value | humanizePercentage }})"
          description: "Le score de qualité est sous 95%. Vérifier les valeurs NaN et les doublons."


  
  # Groupe 2 : Indicateurs Boursiers (RSI)
  
  - name: stock_indicators
    rules:

      # RSI > 70 = zone de surachat (signal potentiel de vente)
      # Nécessite d'exposer rsi_value comme métrique depuis Python
      - alert: RSIOverBought
        expr: pipeline_rsi_current_value > 70
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "RSI en zone de surachat pour {{ $labels.ticker }} (RSI={{ $value | humanize }})"
          description: "Le RSI(14) de {{ $labels.ticker }} dépasse 70. Signal potentiel de surachat."

      # RSI < 30 = zone de survente (signal potentiel d'achat)
      - alert: RSIOversold
        expr: pipeline_rsi_current_value < 30
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "RSI en zone de survente pour {{ $labels.ticker }} (RSI={{ $value | humanize }})"
          description: "Le RSI(14) de {{ $labels.ticker }} est sous 30. Signal potentiel de survente."


  
  # Groupe 3 : Santé MySQL
  
  - name: mysql_health
    rules:

      # Alerte si MySQL est down
      - alert: MySQLDown
        expr: up{job="mysql"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL inaccessible"
          description: "Le container MySQL ne répond plus. Les insertions du pipeline sont bloquées."

      # Alerte si trop de connexions MySQL (approche de la limite max_connections=200)
      - alert: MySQLHighConnections
        expr: mysql_global_status_connections > 150
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Connexions MySQL élevées ({{ $value }})"
          description: "Plus de 150 connexions actives sur MySQL (limite : 200). Risque de saturation."

      # Alerte si les requêtes lentes augmentent
      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Requêtes MySQL lentes détectées"
          description: "Plus d'1 requête lente par seconde sur MySQL. Vérifier les index."

